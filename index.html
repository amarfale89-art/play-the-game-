<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Premium Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    overflow: hidden;
}

.container {
    width: 90%;
    max-width: 600px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    position: relative;
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(-20px);}
    to {opacity: 1; transform: translateY(0);}
}

h2 {
    margin-bottom: 20px;
}

.question {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 20px;
}

.options label {
    display: block;
    background: rgba(255,255,255,0.15);
    padding: 12px;
    margin: 10px 0;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 18px;
}

.options label:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.03);
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(45deg, #00ffcc, #00ccff);
    font-weight: bold;
    cursor: pointer;
    font-size: 18px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.progress-container {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
    transition: 0.3s;
}

#result {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: rgba(0,0,0,0.9);
    padding: 40px;
    border-radius: 25px;
    font-size: 24px;
    text-align: center;
    transition: 0.3s;
    z-index: 1000;
}

#result.show {
    transform: translate(-50%, -50%) scale(1);
}

#timer {
    font-weight: 600;
    font-size: 18px;
    margin-bottom: 15px;
    color: #fffb00;
}
</style>
</head>

<body>

<div class="container">
    <div id="timer">⏱ Time: 15s</div>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <h2 id="qNumber"></h2>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <button onclick="nextQuestion()">Next</button>
</div>

<div id="result"></div>

<script>
// 30 Questions
const questions = [
{q:"Capital of India?", options:["Mumbai","New Delhi","Kolkata"], answer:1},
{q:"5 + 3 = ?", options:["5","8","10"], answer:1},
{q:"Red planet?", options:["Mars","Venus","Earth"], answer:0},
{q:"Largest ocean?", options:["Atlantic","Indian","Pacific"], answer:2},
{q:"HTML stands for?", options:["Hyper Text Markup Language","High Text","None"], answer:0},
{q:"Father of Computers?", options:["Babbage","Newton","Einstein"], answer:0},
{q:"Boiling point of water?", options:["100°C","90°C","80°C"], answer:0},
{q:"Fastest land animal?", options:["Lion","Tiger","Cheetah"], answer:2},
{q:"Smallest prime?", options:["0","1","2"], answer:2},
{q:"King of jungle?", options:["Tiger","Lion","Elephant"], answer:1},
{q:"10 × 2 = ?", options:["20","10","15"], answer:0},
{q:"Festival of lights?", options:["Holi","Diwali","Eid"], answer:1},
{q:"Which sport uses bat?", options:["Football","Cricket","Hockey"], answer:1},
{q:"H2O is?", options:["Oxygen","Hydrogen","Water"], answer:2},
{q:"Pizza invented in?", options:["France","Italy","USA"], answer:1},
{q:"Number of continents?", options:["5","6","7"], answer:2},
{q:"Gas absorbed by plants?", options:["Oxygen","Carbon Dioxide","Nitrogen"], answer:1},
{q:"CPU stands for?", options:["Central Process Unit","Central Processing Unit","Computer Unit"], answer:1},
{q:"Earth shape?", options:["Flat","Round","Square"], answer:1},
{q:"Water freezes at?", options:["0°C","10°C","-10°C"], answer:0},
{q:"Which is not a programming language?", options:["Python","HTML","Banana"], answer:2},
{q:"9 × 9 = ?", options:["81","72","99"], answer:0},
{q:"12 ÷ 4 = ?", options:["2","3","4"], answer:1},
{q:"Sun is a?", options:["Planet","Star","Moon"], answer:1},
{q:"Which animal can fly?", options:["Bat","Elephant","Lion"], answer:0},
{q:"Largest planet?", options:["Earth","Jupiter","Mars"], answer:1},
{q:"Fastest bird?", options:["Ostrich","Eagle","Peregrine Falcon"], answer:2},
{q:"Red + White = ?", options:["Pink","Purple","Orange"], answer:0},
{q:"Keyboard device?", options:["Mouse","Keyboard","Monitor"], answer:1},
{q:"Language for web apps?", options:["Python","Java","JavaScript"], answer:2}
];

let current = 0;
let score = 0;
let timer;
let timeLeft = 15;

function startTimer() {
    clearInterval(timer);
    timeLeft = 15;
    document.getElementById("timer").innerText = `⏱ Time: ${timeLeft}s`;
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = `⏱ Time: ${timeLeft}s`;
        if(timeLeft <= 0){
            clearInterval(timer);
            nextQuestion();
        }
    }, 1000);
}

function loadQuestion() {
    startTimer();
    const q = questions[current];

    document.getElementById("qNumber").innerText =
        "Question " + (current + 1) + " / " + questions.length;
    document.getElementById("question").innerText = q.q;

    let optionsHTML = "";
    q.options.forEach((opt, i) => {
        optionsHTML += `
        <label>
            <input type="radio" name="option" value="${i}">
            ${opt}
        </label>`;
    });
    document.getElementById("options").innerHTML = optionsHTML;

    const progressPercent = ((current) / questions.length) * 100;
    document.getElementById("progressBar").style.width = progressPercent + "%";
}

function nextQuestion() {
    const selected = document.querySelector('input[name="option"]:checked');

    if (selected && parseInt(selected.value) === questions[current].answer) {
        score++;
    }

    current++;

    if (current < questions.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    clearInterval(timer);
    const resultBox = document.getElementById("result");
    resultBox.innerHTML = `
        🎉 Your Score: ${score} / ${questions.length} <br><br>
        <button onclick="location.reload()">Play Again</button>
    `;
    resultBox.classList.add("show");
}

// Start first question
loadQuestion();
</script>

</body>
</html>
